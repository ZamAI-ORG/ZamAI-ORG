<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#020617"/>
      <stop offset="100%" stop-color="#07101f"/>
    </linearGradient>
    <linearGradient id="glow-blue" x1="0" y1="0" x2="400" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="glow-violet" x1="800" y1="0" x2="1200" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="icon-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#3b82f6"/>
      <stop offset="45%"  stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="title-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="35%"  stop-color="#93c5fd"/>
      <stop offset="70%"  stop-color="#67e8f9"/>
      <stop offset="100%" stop-color="#c4b5fd"/>
    </linearGradient>
    <!-- Grid pattern -->
    <pattern id="grid" width="34" height="34" patternUnits="userSpaceOnUse">
      <path d="M 34 0 L 0 0 0 34" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid overlay -->
  <rect width="1200" height="630" fill="url(#grid)" opacity="0.5"/>

  <!-- Ambient glows -->
  <ellipse cx="200" cy="180" rx="380" ry="300" fill="url(#glow-blue)"/>
  <ellipse cx="1050" cy="150" rx="320" ry="260" fill="url(#glow-violet)"/>

  <!-- Icon mark -->
  <rect x="80" y="220" width="80" height="80" rx="20" fill="url(#icon-grad)"/>
  <text
    x="120" y="281"
    font-family="'Inter', system-ui, sans-serif"
    font-size="52"
    font-weight="900"
    text-anchor="middle"
    fill="#020617"
  >Z</text>

  <!-- ZamAI wordmark -->
  <text
    x="180" y="282"
    font-family="'Inter', system-ui, sans-serif"
    font-size="56"
    font-weight="800"
    fill="white"
    letter-spacing="-1"
  >ZamAI</text>

  <!-- Divider -->
  <line x1="80" y1="340" x2="560" y2="340" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>

  <!-- Tagline -->
  <text
    x="80" y="390"
    font-family="'Inter', system-ui, sans-serif"
    font-size="28"
    font-weight="500"
    fill="#94a3b8"
    letter-spacing="0.2"
  >Home of Zeerak</text>

  <!-- Hero statement -->
  <text
    x="80" y="475"
    font-family="'Inter', system-ui, sans-serif"
    font-size="44"
    font-weight="900"
    fill="white"
    letter-spacing="-0.5"
  >Zeerak is the flagship AI assistant</text>
  <text
    x="80" y="530"
    font-family="'Inter', system-ui, sans-serif"
    font-size="44"
    font-weight="900"
    fill="url(#title-grad)"
    letter-spacing="-0.5"
  >by ZamAI.</text>

  <!-- Domain badge -->
  <rect x="940" y="560" width="180" height="40" rx="20" fill="rgba(59,130,246,0.12)" stroke="rgba(59,130,246,0.25)" stroke-width="1"/>
  <text
    x="1030" y="585"
    font-family="'Inter', system-ui, sans-serif"
    font-size="16"
    font-weight="600"
    text-anchor="middle"
    fill="#93c5fd"
  >zamai.dev</text>
</svg>
